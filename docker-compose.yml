services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper
      POSTGRES_DB: xxxclub
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d xxxclub"]
      interval: 5s
      timeout: 5s
      retries: 10

  xxxclub_scraper:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

volumes:
  pgdata:
