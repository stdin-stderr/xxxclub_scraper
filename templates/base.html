<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Library{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0a0f;--s1:#131118;--s2:#1b1820;--s3:#231f2d;
  --bd:#2a2636;--bd2:#3d3850;
  --acc:#cf0900;
  --lnk:#8fa8ef;
  --t1:#f0eeff;--t2:#9d99b8;--t3:#585470;
  --grn:#4aba7a;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;}
a{color:var(--lnk);text-decoration:none;}
a:hover{text-decoration:underline;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

/* ── Layout ── */
.app{display:flex;min-height:100vh;}

/* ── Sidebar ── */
.sidebar{
  width:210px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--bd);
  position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;z-index:100;overflow-y:auto;
  transition:transform .22s cubic-bezier(.4,0,.2,1);
}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;backdrop-filter:blur(2px);}
.sb-brand{
  padding:18px 16px 14px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;text-decoration:none;
}
.sb-brand:hover{text-decoration:none;}
.sb-play{
  width:30px;height:30px;background:var(--acc);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;flex-shrink:0;padding-left:2px;
}
.sb-name{font-size:16px;font-weight:700;color:var(--t1);letter-spacing:-.03em;}
.sb-nav{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:1px;}
.sb-section-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:6px 8px 2px;margin-top:4px;}
.sb-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;
  font-size:13.5px;font-weight:500;color:var(--t2);
  cursor:pointer;transition:background .12s,color .12s;
  text-decoration:none;white-space:nowrap;
}
.sb-item:hover{background:var(--s2);color:var(--t1);text-decoration:none;}
.sb-item.active{background:var(--s3);color:var(--t1);}
.sb-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;line-height:1;}
.sb-sep{height:1px;background:var(--bd);margin:8px 0;}
.sb-footer{padding:10px 8px;border-top:1px solid var(--bd);}

/* ── Main ── */
.main{margin-left:210px;flex:1;min-width:0;}

/* ── Page bar ── */
.page-bar{
  display:flex;align-items:center;gap:12px;padding:13px 24px;
  background:var(--s1);border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:50;
}
.page-bar-title{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--t1);white-space:nowrap;}
.page-bar-count{font-size:12px;color:var(--t3);font-family:var(--mono);white-space:nowrap;}
.search-wrap{position:relative;flex:1;max-width:320px;margin-left:auto;}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none;}
.search-input{
  width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--t1);
  border-radius:8px;padding:7px 10px 7px 32px;font-size:13px;font-family:var(--font);outline:none;
  transition:border-color .12s;
}
.search-input:focus{border-color:var(--bd2);}
.search-input::placeholder{color:var(--t3);}

/* ── Filter strip ── */
.filter-strip{display:flex;gap:6px;padding:10px 24px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--bd);}
.fpill{
  font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;
  border:1px solid var(--bd);background:transparent;color:var(--t2);
  cursor:pointer;transition:all .12s;white-space:nowrap;font-family:var(--font);
  text-decoration:none;
}
.fpill:hover{background:var(--s2);color:var(--t1);border-color:var(--bd2);text-decoration:none;}
.fpill.active{background:var(--acc);color:#fff;border-color:var(--acc);}
.fsep{width:1px;height:14px;background:var(--bd);align-self:center;flex-shrink:0;}

/* ── Count bar ── */
.count-bar{padding:8px 24px;font-size:12px;font-family:var(--mono);color:var(--t3);}

/* ── Scene grid ── */
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(288px,1fr));gap:16px;padding:16px 24px 40px;}
.sc-card{
  background:var(--s1);border-radius:10px;overflow:hidden;cursor:pointer;
  transition:transform .15s,box-shadow .15s,border-color .15s;
  display:flex;flex-direction:column;border:1px solid var(--bd);
}
.sc-card:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,.55);border-color:var(--bd2);}
.sc-thumb{position:relative;width:100%;padding-top:56.25%;background:var(--s3);overflow:hidden;}
.sc-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .3s ease;}
.sc-card:hover .sc-thumb img{transform:scale(1.04);}
.sc-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .2s;display:flex;align-items:center;justify-content:center;}
.sc-card:hover .sc-overlay{background:rgba(0,0,0,.48);}
.sc-play{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:16px;color:#111;padding-left:3px;opacity:0;transform:scale(.75);transition:opacity .2s,transform .2s;}
.sc-card:hover .sc-play{opacity:1;transform:scale(1);}
.sc-res{position:absolute;bottom:7px;right:7px;background:rgba(0,0,0,.78);color:#fff;font-size:10px;font-weight:600;font-family:var(--mono);padding:2px 6px;border-radius:4px;letter-spacing:.04em;}
.sc-dur{position:absolute;bottom:7px;left:7px;background:rgba(0,0,0,.78);color:#fff;font-size:10px;font-weight:600;font-family:var(--mono);padding:2px 6px;border-radius:4px;}
.sc-body{padding:11px 13px 13px;display:flex;flex-direction:column;flex:1;}
.sc-site-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.sc-site-logo{height:14px;width:auto;border-radius:2px;opacity:.7;}
.sc-site-name{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;}
.sc-title{font-size:14px;font-weight:600;line-height:1.35;color:var(--t1);letter-spacing:-.01em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px;}
.sc-performers{font-size:12px;color:var(--lnk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:10px;}
.sc-meta{display:flex;align-items:center;gap:6px;margin-top:auto;flex-wrap:wrap;}
.sc-date,.sc-size{font-size:11px;font-family:var(--mono);color:var(--t3);}
.sc-size{margin-left:auto;}
.seeds-pill{font-size:10px;font-weight:600;font-family:var(--mono);padding:2px 7px;border-radius:10px;background:rgba(74,186,122,.12);color:var(--grn);border:1px solid rgba(74,186,122,.22);}
.seeds-pill.dead{background:rgba(88,84,112,.12);color:var(--t3);border-color:var(--bd);}
.sc-actions{margin-top:10px;display:flex;gap:5px;}
.act-btn{flex:1;background:var(--s2);border:1px solid var(--bd);color:var(--t2);border-radius:6px;padding:6px 0;font-size:12px;font-family:var(--font);font-weight:500;cursor:pointer;transition:all .12s;text-align:center;text-decoration:none;}
.act-btn:hover{background:var(--acc);color:#fff;border-color:var(--acc);text-decoration:none;}
.act-btn.stremio{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.25);color:#a5b4fc;flex:0 0 44px;}
.act-btn.stremio:hover{background:rgba(99,102,241,.22);color:#c7d2fe;}

/* ── Performer grid ── */
.perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:14px;padding:16px 24px 40px;}
.perf-card{background:var(--s1);border-radius:10px;overflow:hidden;border:1px solid var(--bd);transition:transform .15s,box-shadow .15s,border-color .15s;cursor:pointer;display:flex;flex-direction:column;align-items:center;text-decoration:none;color:inherit;}
.perf-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.45);border-color:var(--bd2);text-decoration:none;}
.perf-portrait{width:100%;aspect-ratio:2/3;background:var(--s3);overflow:hidden;position:relative;}
.perf-portrait img{width:100%;height:100%;object-fit:cover;object-position:top center;transition:transform .3s;}
.perf-card:hover .perf-portrait img{transform:scale(1.05);}
.perf-no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:42px;color:var(--t3);}
.perf-info{padding:10px 10px 12px;width:100%;text-align:center;}
.perf-name{font-size:13px;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:2px;}
.perf-gender{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:500;}

/* ── Sites grid ── */
.sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(208px,1fr));gap:14px;padding:16px 24px 40px;}
.site-card{background:var(--s1);border-radius:10px;overflow:hidden;border:1px solid var(--bd);transition:transform .15s,box-shadow .15s,border-color .15s;cursor:pointer;display:flex;flex-direction:column;text-decoration:none;color:inherit;}
.site-card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.4);border-color:var(--bd2);text-decoration:none;}
.site-banner{width:100%;aspect-ratio:16/7;background:var(--s3);display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden;}
.site-banner img{max-height:38px;max-width:140px;object-fit:contain;width:auto;}
.site-banner-name{font-size:14px;font-weight:700;color:var(--t2);letter-spacing:-.01em;}
.site-info{padding:11px 13px 13px;}
.site-name{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px;letter-spacing:-.01em;}
.site-network{font-size:11px;color:var(--t3);margin-bottom:5px;}
.site-count{font-size:12px;font-family:var(--mono);color:var(--t2);}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;overflow-y:auto;padding:40px 16px;backdrop-filter:blur(5px);}
.modal-overlay.open{display:flex;justify-content:center;align-items:flex-start;}
.modal-box{background:var(--s1);border-radius:14px;max-width:740px;width:100%;position:relative;border:1px solid var(--bd2);overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.65);}
.modal-hero-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--s3);}
.modal-close{position:absolute;top:11px;right:11px;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;z-index:10;transition:background .12s;}
.modal-close:hover{background:rgba(0,0,0,.92);}
.modal-body{padding:20px 24px 28px;}
.modal-site-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.modal-site-logo{height:18px;border-radius:2px;}
.modal-site-name{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;text-decoration:none;}
.modal-site-name:hover{color:var(--t2);}
.modal-network{font-size:11px;color:var(--t3);}
.modal-network a{color:var(--t3);}
.modal-network a:hover{color:var(--t2);}
.modal-dur,.modal-format{font-size:11px;font-family:var(--mono);color:var(--t3);}
.modal-date{font-size:11px;font-family:var(--mono);color:var(--t3);margin-left:auto;}
.modal-title{font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--t1);line-height:1.2;margin-bottom:12px;}
.modal-performers{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.modal-performer{display:flex;flex-direction:column;align-items:center;gap:4px;width:64px;color:inherit;text-decoration:none;}
.modal-performer:hover span{color:var(--t1);}
.modal-performer img{width:56px;height:56px;border-radius:50%;object-fit:cover;background:var(--s3);border:2px solid var(--bd2);}
.modal-performer span{font-size:10px;text-align:center;color:var(--lnk);line-height:1.2;word-break:break-word;}
.modal-desc{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:16px;}
.modal-tags-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
.modal-tag{font-size:11px;padding:3px 9px;border-radius:12px;background:rgba(143,168,239,.08);color:var(--lnk);border:1px solid rgba(143,168,239,.15);}
.modal-action-row{display:flex;gap:8px;margin-bottom:16px;}
.modal-watch-btn{flex:1;background:rgba(74,186,122,.12);color:var(--grn);border:1px solid rgba(74,186,122,.22);border-radius:7px;padding:8px 0;font-size:13px;font-weight:600;text-align:center;text-decoration:none;font-family:var(--font);transition:background .12s;}
.modal-watch-btn:hover{background:rgba(74,186,122,.22);text-decoration:none;}
.modal-stremio-btn{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);color:#a5b4fc;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:500;text-align:center;text-decoration:none;font-family:var(--font);transition:background .12s;white-space:nowrap;}
.modal-stremio-btn:hover{background:rgba(99,102,241,.22);text-decoration:none;}
.modal-dl-head{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;border-top:1px solid var(--bd);padding-top:16px;}
.modal-torrents table{width:100%;border-collapse:collapse;font-size:12px;}
.modal-torrents th{text-align:left;padding:5px 8px;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);white-space:nowrap;font-family:var(--mono);}
.modal-torrents td{padding:7px 8px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.modal-torrents tr:last-child td{border-bottom:none;}
.modal-torrents tr:hover td{background:var(--s2);}
.modal-torrents a{color:var(--lnk);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;display:inline-block;vertical-align:middle;}
.modal-torrents a:hover{text-decoration:underline;}
.seeds-good{color:var(--grn);font-weight:600;}

/* ── Torrents table ── */
.torr-wrap{padding:0 24px 40px;overflow-x:auto;}
.torr-table{width:100%;border-collapse:collapse;font-size:13px;}
.torr-table th{text-align:left;padding:7px 12px;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bd);white-space:nowrap;font-family:var(--mono);}
.torr-table td{padding:9px 12px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.torr-table tr:last-child td{border-bottom:none;}
.torr-table tr:hover td{background:var(--s2);}
.t-thumb-img{width:108px;height:61px;object-fit:cover;border-radius:5px;display:block;}
.t-scene-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px;}
.t-scene-perfs{font-size:11px;color:var(--lnk);}
.t-site{font-size:12px;color:var(--t2);white-space:nowrap;}
.t-meta-txt{font-size:11px;font-family:var(--mono);color:var(--t3);white-space:nowrap;}
.t-seeds-g{font-family:var(--mono);font-size:12px;color:var(--grn);font-weight:600;}
.t-seeds-d{font-family:var(--mono);font-size:12px;color:var(--t3);}
.t-dl-btn{background:var(--acc);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-family:var(--font);font-weight:600;cursor:pointer;transition:opacity .12s;}
.t-dl-btn:hover{opacity:.85;}

/* ── Advanced filter bar ── */
.adv-bar{display:flex;flex-wrap:wrap;gap:7px;padding:10px 24px 12px;border-bottom:1px solid var(--bd);align-items:center;}
.adv-sel,.adv-inp{background:var(--s1);border:1px solid var(--bd);color:var(--t1);border-radius:6px;padding:6px 10px;font-size:12px;font-family:var(--font);outline:none;}
.adv-inp::placeholder{color:var(--t3);}
.adv-sel:focus,.adv-inp:focus{border-color:var(--bd2);}
.adv-go{background:var(--acc);color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:12px;font-family:var(--font);font-weight:600;cursor:pointer;}
.adv-go:hover{opacity:.85;}

/* ── View toggle ── */
.view-toggle{display:flex;background:var(--s2);border-radius:6px;padding:2px;gap:2px;border:1px solid var(--bd);}
.vt-btn{background:transparent;border:none;color:var(--t3);padding:4px 9px;border-radius:4px;cursor:pointer;font-size:14px;transition:all .12s;}
.vt-btn.active{background:var(--s3);color:var(--t1);}

/* ── Hero (performer / site / network) ── */
.hero-section{position:relative;min-height:280px;background:var(--s1);border-bottom:1px solid var(--bd);overflow:hidden;}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:blur(1px) brightness(.40);transform:scale(1.12);}
.hero-content{position:relative;z-index:1;display:flex;align-items:flex-end;gap:28px;padding:50px 24px 28px;max-width:960px;}
.hero-portrait{width:120px;height:180px;border-radius:10px;object-fit:cover;object-position:top center;border:2px solid var(--bd2);flex-shrink:0;box-shadow:0 8px 28px rgba(0,0,0,.5);}
.hero-logo-wrap{width:160px;height:120px;border-radius:14px;background:rgba(18,18,24,.88);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;padding:16px;flex-shrink:0;box-shadow:0 8px 28px rgba(0,0,0,.5);}
.hero-logo-wrap img{max-width:100%;max-height:100%;object-fit:contain;}
.hero-logo-placeholder{font-size:36px;color:var(--t3);}
.hero-no-img{width:120px;height:180px;border-radius:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:44px;color:var(--t3);border:2px solid var(--bd2);flex-shrink:0;}
.hero-info{flex:1;min-width:0;padding-bottom:4px;}
.hero-name{font-size:34px;font-weight:800;letter-spacing:-.03em;color:var(--t1);margin-bottom:8px;text-shadow:0 2px 12px rgba(0,0,0,.4);}
.hero-stats{display:flex;flex-wrap:wrap;gap:5px 18px;margin-bottom:10px;}
.hero-stat{font-size:12px;display:flex;gap:5px;}
.hero-stat-lbl{color:var(--t3);}
.hero-stat-val{color:var(--t2);font-weight:500;}
.hero-bio{font-size:13px;color:var(--t2);line-height:1.6;max-width:560px;margin-bottom:12px;}
.hero-links{display:flex;flex-wrap:wrap;gap:6px;}
.hero-link{font-size:11px;color:var(--lnk);background:rgba(143,168,239,.1);border:1px solid rgba(143,168,239,.2);padding:3px 10px;border-radius:4px;}
.hero-link:hover{background:rgba(143,168,239,.2);text-decoration:none;}
.hero-sub{font-size:12px;color:var(--t3);margin-bottom:6px;}
.hero-sub a{color:var(--lnk);}

/* ── Section head ── */
.section-head{padding:18px 24px 0;font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;}

/* ── Sites row (in network detail) ── */
.sites-chips-row{display:flex;flex-wrap:wrap;gap:10px;padding:12px 24px 4px;}
.site-chip{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;text-decoration:none;color:var(--t1);transition:background .12s;}
.site-chip:hover{background:var(--s2);text-decoration:none;}
.site-chip img{height:20px;width:auto;border-radius:2px;}
.site-chip span{font-size:13px;}

/* ── Poster grid (performer detail) ── */
.poster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;padding:12px 24px 4px;}
.poster-btn{display:block;aspect-ratio:2/3;border-radius:10px;overflow:hidden;background:var(--s3);border:1px solid var(--bd);cursor:pointer;padding:0;appearance:none;}
.poster-btn img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .16s ease;}
.poster-btn:hover img{transform:scale(1.04);}
.poster-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1100;padding:20px;align-items:center;justify-content:center;}
.poster-overlay.open{display:flex;}
.poster-modal{position:relative;max-width:min(92vw,1100px);max-height:92vh;}
.poster-modal img{display:block;max-width:100%;max-height:92vh;width:auto;height:auto;border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.55);}
.poster-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.72);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}

/* ── Configure page ── */
.config-page{max-width:820px;padding:32px 24px 60px;}
.config-section{margin-bottom:36px;}
.config-section-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd);}
.debrid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px;}
.debrid-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;gap:8px;}
.debrid-card:hover{border-color:var(--bd2);background:var(--s2);}
.debrid-card.selected{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc);}
.debrid-card.connected{border-color:var(--grn);box-shadow:0 0 0 1px var(--grn);}
.debrid-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;letter-spacing:-.02em;font-family:var(--mono);background:var(--s3);color:var(--t2);flex-shrink:0;}
.debrid-name{font-size:13px;font-weight:600;color:var(--t1);}
.debrid-desc{font-size:11px;color:var(--t3);line-height:1.4;}
.debrid-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(74,186,122,.12);color:var(--grn);border:1px solid rgba(74,186,122,.22);align-self:flex-start;}
.config-field{display:flex;flex-direction:column;gap:6px;max-width:440px;margin-bottom:12px;}
.config-label{font-size:12px;font-weight:600;color:var(--t2);}
.config-hint{font-size:11px;color:var(--t3);line-height:1.5;}
.config-input{background:var(--s1);border:1px solid var(--bd);color:var(--t1);border-radius:8px;padding:9px 12px;font-size:13px;font-family:var(--font);outline:none;transition:border-color .12s;width:100%;}
.config-input:focus{border-color:var(--bd2);}
.config-input::placeholder{color:var(--t3);}
.config-row{display:flex;gap:8px;align-items:center;}
.config-btn{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-family:var(--font);font-weight:600;cursor:pointer;transition:opacity .12s;white-space:nowrap;}
.config-btn:hover{opacity:.85;}
.config-btn.secondary{background:var(--s2);color:var(--t2);border:1px solid var(--bd);}
.config-btn.secondary:hover{background:var(--s3);color:var(--t1);opacity:1;}
.config-status{font-size:12px;padding:7px 12px;border-radius:6px;font-family:var(--mono);margin-top:4px;}
.config-status.ok{background:rgba(74,186,122,.1);color:var(--grn);border:1px solid rgba(74,186,122,.2);}
.config-status.err{background:rgba(207,9,0,.1);color:var(--acc);border:1px solid rgba(207,9,0,.2);}
.config-status.loading{background:var(--s2);color:var(--t3);border:1px solid var(--bd);}

/* ── Sidebar toggle (mobile) ── */
.sb-toggle{display:none;position:fixed;top:10px;left:10px;z-index:110;background:var(--s1);border:1px solid var(--bd);border-radius:8px;width:38px;height:38px;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:18px;padding:0;transition:background .12s;}
.sb-toggle:hover{background:var(--s2);color:var(--t1);}

/* ── Pagination ── */
.pg-bar{display:flex;align-items:center;gap:8px;padding:0 24px 32px;}
.pg-btn{background:var(--s2);border:1px solid var(--bd);color:var(--t2);border-radius:6px;padding:6px 14px;font-size:13px;font-family:var(--font);cursor:pointer;transition:all .12s;text-decoration:none;}
.pg-btn:hover{background:var(--s3);border-color:var(--bd2);color:var(--t1);text-decoration:none;}
.pg-btn.disabled{opacity:.35;pointer-events:none;}
.pg-info{font-size:12px;font-family:var(--mono);color:var(--t3);margin:0 4px;}

@media(max-width:680px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sb-overlay.open{display:block;}
  .main{margin-left:0;}
  .sb-toggle{display:flex !important;}
  .watch-layout{grid-template-columns:1fr !important;}
  .streams-col{border-left:none !important;border-top:1px solid var(--bd);height:auto !important;position:static !important;}
}

{% block extra_css %}{% endblock %}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <a class="sb-brand" href="/scenes">
      <div class="sb-play">&#9654;</div>
      <span class="sb-name">Library</span>
    </a>
    <nav class="sb-nav">
      <span class="sb-section-lbl">Browse</span>
      <a class="sb-item{% if active_page in ('scenes','movies') %} active{% endif %}" href="/scenes">
        <span class="sb-icon">&#9654;</span>Scenes
      </a>
      <a class="sb-item{% if active_page == 'movies' %} active{% endif %}" href="/movies">
        <span class="sb-icon">&#127916;</span>Movies
      </a>
      <a class="sb-item{% if active_page in ('torrents',) %} active{% endif %}" href="/torrents">
        <span class="sb-icon">&#8595;</span>Torrents
      </a>
      <a class="sb-item{% if active_page in ('performers','performer') %} active{% endif %}" href="/performers">
        <span class="sb-icon">&#9733;</span>Performers
      </a>
      <a class="sb-item{% if active_page in ('sites','site') %} active{% endif %}" href="/sites">
        <span class="sb-icon">&#9670;</span>Sites
      </a>
      <a class="sb-item{% if active_page in ('networks','network') %} active{% endif %}" href="/networks">
        <span class="sb-icon">&#8862;</span>Networks
      </a>
    </nav>
    <div class="sb-footer">
      <a class="sb-item{% if active_page == 'configure' %} active{% endif %}" href="/configure" style="font-size:12px;">
        <span class="sb-icon" style="font-size:13px;">&#9881;</span>Configure
      </a>
    </div>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>

{% block scene_modal %}{% endblock %}
{% block scripts %}{% endblock %}

<button class="sb-toggle" id="sb-toggle" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
<div class="sb-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
<script>
function openSidebar(){
  document.querySelector('.sidebar').classList.add('open');
  document.getElementById('sb-overlay').classList.add('open');
}
function closeSidebar(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('open');
}
function toggleSidebar(){ document.querySelector('.sidebar').classList.contains('open') ? closeSidebar() : openSidebar(); }
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeSidebar(); });
</script>
</body>
</html>
